<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Planning des Jeudis</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-active: #38bdf8;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --grad-1: linear-gradient(135deg, #0284c7, #0369a1);
            --grad-2: linear-gradient(135deg, #b45309, #78350f);
            --grad-3: linear-gradient(135deg, #047857, #065f46);
            --grad-4: linear-gradient(135deg, #be123c, #9f1239);
            --grad-5: linear-gradient(135deg, #6d28d9, #5b21b6);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; min-height: 100vh; flex-direction: row;
            -webkit-tap-highlight-color: transparent;
        }

        /* Écran de Bienvenue / Profil */
        .welcome-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0f172a; color: white; z-index: 2000;
            display: flex; justify-content: center; align-items: center; padding: 16px;
            overflow-y: auto;
        }
        .welcome-card {
            background: #1e293b; padding: 30px 20px; border-radius: 20px;
            max-width: 450px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        .welcome-card h2 { margin-top: 0; font-size: 1.6rem; font-weight: 800; }
        .welcome-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        
        .form-control { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 16px; }
        .form-control label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #94a3b8; }
        .form-control select, .form-control input {
            background: #0f172a; border: 1px solid #334155; color: white; padding: 14px;
            border-radius: 12px; font-size: 1rem; font-weight: 600; outline: none; width: 100%;
            appearance: none;
        }
        
        .emoji-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 5px; }
        .emoji-btn {
            font-size: 1.3rem; background: #0f172a; border: 2px solid transparent;
            padding: 10px 0; border-radius: 10px; cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: center; align-items: center;
        }
        .emoji-btn.selected { border-color: var(--sidebar-active); background: rgba(56, 189, 248, 0.1); }
        
        .primary-btn {
            background: #0284c7; color: white; border: none; padding: 14px; width: 100%;
            border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer;
        }
        .divider { margin: 20px 0; border-top: 1px solid #334155; position: relative; }
        .divider span { position: absolute; top: -10px; background: #1e293b; padding: 0 10px; color: #64748b; font-size: 0.75rem; font-weight: 700; left: 50%; transform: translateX(-50%); }

        /* Sidebar Desktop */
        .sidebar {
            width: 280px; background-color: var(--sidebar-bg); padding: 40px 24px;
            display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
        }
        .logo-area { font-weight: 800; font-size: 1.3rem; color: white; margin-bottom: 20px; }
        .current-user-box {
            background: rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px;
        }
        .current-user-info { display: flex; align-items: center; gap: 10px; color: white; font-weight: 700; }
        .logout-btn { background: transparent; border: none; color: #f43f5e; cursor: pointer; font-size: 0.8rem; font-weight: 700; }

        .nav-btn {
            display: flex; align-items: center; gap: 14px; padding: 14px 18px;
            border-radius: 12px; background: transparent; border: none;
            color: var(--sidebar-text); font-weight: 600; font-size: 0.95rem; cursor: pointer;
        }
        .nav-btn.active { background-color: rgba(56, 189, 248, 0.1); color: var(--sidebar-active); }

        /* Zone Principale */
        .main-content { flex: 1; padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }

        .selector-wrapper {
            display: flex; align-items: center; gap: 8px; background: white;
            padding: 10px 16px; border-radius: 12px; box-shadow: var(--card-shadow); border: 1px solid #e2e8f0;
        }
        .selector-wrapper label { font-weight: 700; font-size: 0.8rem; color: var(--text-muted); }
        .selector-wrapper select { border: none; background: transparent; font-size: 0.95rem; font-weight: 800; color: #0284c7; outline: none; }

        /* Accordion Équipe mobile */
        .accordion-header {
            background: white; border-radius: 14px; padding: 16px; box-shadow: var(--card-shadow);
            margin-bottom: 20px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .accordion-content { display: none; margin-bottom: 20px; background: white; padding: 16px; border-radius: 14px; box-shadow: var(--card-shadow); border: 1px solid #e2e8f0; }
        .accordion-content.open { display: block; }

        .inputs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .input-group { display: flex; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 10px; }
        .input-group input { border: none; background: transparent; width: 100%; font-size: 0.85rem; font-weight: 600; outline: none; }
        .edit-emoji-select { border: none; background: transparent; font-size: 1rem; cursor: pointer; outline: none; margin-right: 2px; }

        /* Grille des cartes de planning */
        .page-section { display: none; }
        .page-section.active { display: block; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        /* Cartes Style Mobile */
        .semaine-card { border-radius: 20px; color: white; padding: 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .card-header { font-size: 1.1rem; font-weight: 800; display: flex; justify-content: space-between; align-items: flex-start; }
        
        .role-box { display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.1); padding: 10px 12px; border-radius: 12px; }
        .role-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; opacity: 0.75; margin-bottom: 2px; }
        .role-select-custom { background: transparent; border: none; color: white; font-size: 0.95rem; font-weight: 700; outline: none; width: 100%; padding: 2px 0; }
        .role-select-custom option { color: var(--text-main); }

        .presence-zone { background: rgba(0, 0, 0, 0.15); border-radius: 12px; padding: 12px; }
        .presence-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 0.85rem; }
        .presence-btn { background: white; color: #0f172a; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; cursor: pointer; }
        .presence-btn.active { background: #22c55e; color: white; }
        .presence-list { opacity: 0.85; font-size: 0.75rem; margin-top: 6px; line-height: 1.3; }

        /* Notation Étoiles Format Doigt Mobile */
        .rating-box { display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 12px; gap: 10px; }
        .rating-row { display: flex; align-items: center; justify-content: space-between; }
        .stars { display: flex; gap: 8px; }
        .star { font-size: 1.6rem; color: rgba(255, 255, 255, 0.25); cursor: pointer; padding: 2px; }
        .star.active { color: #facc15; }
        .avg-rating { font-size: 0.75rem; font-weight: 700; background: rgba(255,255,255,0.15); padding: 4px 8px; border-radius: 8px; text-align: right; line-height: 1.3; }

        /* Classement */
        .stats-container { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--card-shadow); }
        .stats-table { width: 100%; border-collapse: collapse; }
        .stats-table th { padding: 12px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; text-align: left; }
        .stats-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .badge-rank { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 800; background: #f1f5f9; font-size: 0.8rem; }
        .rank-1 { background: #fef08a; color: #854d0e; }
        .rank-2 { background: #e2e2e2; color: #475569; }
        .rank-3 { background: #ffedd5; color: #9a3412; }

        /* Responsive Mobile Global */
        @media (max-width: 768px) {
            body { flex-direction: column; background-color: #f1f5f9; }
            .sidebar { display: none; }
            
            .mobile-nav {
                position: fixed; bottom: 0; left: 0; right: 0; height: 68px;
                background: #0f172a; display: flex; justify-content: space-around; align-items: center;
                z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); padding-bottom: env(safe-area-inset-bottom);
            }
            .mobile-nav-btn {
                background: transparent; border: none; color: #94a3b8; display: flex;
                flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem;
                font-weight: 700; width: 33%; cursor: pointer;
            }
            .mobile-nav-btn.active { color: #38bdf8; }
            .mobile-nav-btn span:first-child { font-size: 1.3rem; }

            .main-content { padding: 16px 16px 90px 16px; }
            h1 { font-size: 1.4rem; }
            .header-status { flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 16px; }
            .selector-wrapper { padding: 8px 12px; }
            
            .cards-grid { grid-template-columns: 1fr; gap: 16px; }
            .emoji-picker { grid-template-columns: repeat(5, 1fr); }
        }

        @media (min-width: 769px) {
            .mobile-nav { display: none; }
            .accordion-header { pointer-events: none; }
            .accordion-header span:last-child { display: none; }
            .accordion-content { display: block; border: none; padding: 0; box-shadow: none; background: transparent; }
        }

        .sem-1 { background: var(--grad-1); } .sem-2 { background: var(--grad-2); }
        .sem-3 { background: var(--grad-3); } .sem-4 { background: var(--grad-4); }
        .sem-5 { background: var(--grad-5); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ÉCRAN D'ACCUEIL / PROFIL -->
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-card">
            <h2>✨ Jeudi Cuistot</h2>
            <p>Crée ton profil ou sélectionne ton prénom pour entrer.</p>
            
            <div class="form-control">
                <label for="existingProfileSelect">👤 Profil existant :</label>
                <select id="existingProfileSelect"></select>
            </div>
            <button class="primary-btn" id="loginBtn">Se connecter</button>

            <div class="divider"><span>OU</span></div>

            <div class="form-control">
                <label for="newProfileName">👋 Ton prénom :</label>
                <input type="text" id="newProfileName" placeholder="Ex: Lucas...">
            </div>

            <div class="form-control">
                <label>🎨 Ton Avatar :</label>
                <div class="emoji-picker" id="emojiPickerContainer"></div>
            </div>

            <button class="primary-btn" id="createProfileBtn" style="background:#059669;">Créer & Entrer</button>
        </div>
    </div>

    <!-- SIDEBAR DESKTOP -->
    <div class="sidebar">
        <div class="logo-area">✨ <span>Jeudi Cuistot</span></div>
        <div class="current-user-box">
            <div class="current-user-info">
                <span id="sidebarUserEmoji">🦊</span>
                <span id="sidebarUserName">-</span>
            </div>
            <button class="logout-btn" id="logoutBtn">Changer</button>
        </div>
        <button class="nav-btn active" id="btn-aperçu" onclick="switchPage('aperçu')">📅 <span>Planning</span></button>
        <button class="nav-btn" id="btn-stats" onclick="switchPage('stats')">🏆 <span>Classement</span></button>
    </div>

    <!-- BARRE NAV BASSE MOBILE -->
    <div class="mobile-nav">
        <button class="mobile-nav-btn active" id="mbtn-aperçu" onclick="switchPage('aperçu')"><span>📅</span><span>Planning</span></button>
        <button class="mobile-nav-btn" id="mbtn-stats" onclick="switchPage('stats')"><span>🏆</span><span>Classement</span></button>
        <button class="mobile-nav-btn" id="mbtn-logout" onclick="triggerLogout()"><span>⚙️</span><span id="mobileUserName">Profil</span></button>
    </div>

    <!-- ZONE PRINCIPALE -->
    <div class="main-content">
        <div class="header-status">
            <h1>Jeudi Cuistot</h1>
            <div class="selector-wrapper">
                <select id="monthSelect">
                    <option value="2026-06">Juin</option>
                    <option value="2026-07">Juillet</option>
                    <option value="2026-08">Août</option>
                    <option value="2026-09">Septembre</option>
                    <option value="2026-10">Octobre</option>
                    <option value="2026-11">Novembre</option>
                    <option value="2026-12">Décembre</option>
                </select>
            </div>
        </div>

        <!-- ONGLET 1 : PLANNING -->
        <div id="page-aperçu" class="page-section active">
            <div class="accordion-header" onclick="toggleTeamAccordion()">
                <span>👥 Gérer l'équipe (<span id="teamCount">0</span>)</span>
                <span id="accordionArrow">▼</span>
            </div>
            <div class="accordion-content" id="teamAccordionContent">
                <div class="inputs-grid" id="inputsContainer"></div>
            </div>

            <h2 id="planningTitle" style="font-weight:800; font-size:1.2rem; margin: 20px 0 12px 0; color:#1e293b;">📅 Les Jeudis</h2>
            <div class="cards-grid" id="cardsContainer"></div>
        </div>

        <!-- ONGLET 2 : STATS -->
        <div id="page-stats" class="page-section">
            <div class="stats-container">
                <h2 id="statsTitle" style="margin-top:0; font-weight:800; font-size:1.2rem; margin-bottom:4px;">🏆 Classement</h2>
                <p style="color:var(--text-muted); margin-bottom:20px; margin-top:0; font-size:0.8rem;">Basé sur la moyenne de satisfaction générale.</p>
                <table class="stats-table">
                    <thead>
                        <tr><th style="width: 60px;">Rang</th><th>Nom</th><th>Score</th><th>Plats</th></tr>
                    </thead>
                    <tbody id="statsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCsJACTFFdHAFlvOQNw9h5spegq7lV2-zE",
        authDomain: "planning-jeudi.firebaseapp.com",
        projectId: "planning-jeudi",
        storageBucket: "planning-jeudi.firebasestorage.app",
        messagingSenderId: "894632315552",
        appId: "1:894632315552:web:aed8853528dec823d617c5",
        measurementId: "G-YR52XHS5C0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const availableEmojis = ["🦊", "🦁", "🐼", "🐨", "🐯", "🐱", "🐰", "🦄", "🦅", "🦝", "🐸", "🐵", "🌶️", "🥑", "🧑‍🍳", "🍕", "🧁", "🍉", "🧋"];
    let selectedEmoji = availableEmojis[0];

    // Données d'équipe globales (indépendantes du mois choisi)
    let defaultParticipants = ["Lucas", "Laura", "Claribel", "Yoann", "Mireille", "Jeanne", "Candices", "Killian", "Annaig", "Ewen", "Anthony", "Clement"];
    let participants = [...defaultParticipants];
    let customEmojisMapping = {}; 
    
    // Données spécifiques au mois
    let thursdaysData = [];
    let overrides = {}; 

    let currentMonth = "2026-06";
    let currentUser = "";
    let unsubscribeMonth = null;

    const monthNames = {
        "2026-06": "Juin", "2026-07": "Juillet", "2026-08": "Août",
        "2026-09": "Septembre", "2026-10": "Octobre", "2026-11": "Novembre", "2026-12": "Décembre"
    };

    // Init picker émojis
    const pickerContainer = document.getElementById('emojiPickerContainer');
    availableEmojis.forEach((emoji, i) => {
        const btn = document.createElement('button');
        btn.className = `emoji-btn ${i === 0 ? 'selected' : ''}`;
        btn.innerText = emoji;
        btn.type = "button";
        btn.addEventListener('click', () => {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedEmoji = emoji;
        });
        pickerContainer.appendChild(btn);
    });

    window.toggleTeamAccordion = function() {
        if(window.innerWidth > 768) return;
        const content = document.getElementById('teamAccordionContent');
        const arrow = document.getElementById('accordionArrow');
        content.classList.toggle('open');
        arrow.innerText = content.classList.contains('open') ? "▲" : "▼";
    }

    function getThursdaysInMonthWithGlobalIndex(year, monthIndex) {
        let date = new Date(year, 0, 1);
        let thursdaysCount = 0;
        let thursdaysInRequestedMonth = [];
        
        while (date.getFullYear() === year) {
            if (date.getDay() === 4) {
                if (date.getMonth() === monthIndex) {
                    thursdaysInRequestedMonth.push({
                        dateText: `Jeudi ${date.getDate()} ${monthNames[`2026-${String(monthIndex + 1).padStart(2, '0')}`]}`,
                        globalIndex: thursdaysCount
                    });
                }
                thursdaysCount++;
            }
            date.setDate(date.getDate() + 1);
        }
        return thursdaysInRequestedMonth;
    }

    function getRolesForGlobalIndex(globalIndex) {
        if (overrides && overrides[globalIndex]) {
            return {
                plat: overrides[globalIndex].plat || "Aucun",
                dessert: overrides[globalIndex].dessert || "Aucun",
                remp: overrides[globalIndex].remp || "Aucun"
            };
        }
        const baseOrder = ["Jeanne", "Laura", "Claribel", "Yoann", "Lucas", "Mireille", "Candices", "Killian", "Annaig", "Ewen", "Anthony", "Clement"];
        const order = baseOrder.filter(n => participants.includes(n));
        participants.forEach(p => { if (!order.includes(p)) order.push(p); });

        const len = order.length;
        if(len === 0) return { plat: "Invité(e)", dessert: "Invité(e)", remp: "Invité(e)" };

        const platIdx = globalIndex % len;
        const dessertIdx = (globalIndex + Math.floor(len / 2)) % len; 
        let rempIdx = (globalIndex + 1) % len;
        if (rempIdx === platIdx || rempIdx === dessertIdx) rempIdx = (rempIdx + 1) % len;

        return { order, plat: order[platIdx], dessert: order[dessertIdx], remp: order[rempIdx] };
    }

    window.switchPage = function(pageId) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn, .mobile-nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(`page-${pageId}`).classList.add('active');
        const pcBtn = document.getElementById(`btn-${pageId}`);
        const mobBtn = document.getElementById(`mbtn-${pageId}`);
        if(pcBtn) pcBtn.classList.add('active');
        if(mobBtn) mobBtn.classList.add('active');
        
        if(pageId === 'stats') generateStats();
    }

    document.getElementById('monthSelect').addEventListener('change', (e) => {
        currentMonth = e.target.value;
        document.getElementById('planningTitle').innerText = `📅 Les Jeudis de ${monthNames[currentMonth]}`;
        document.getElementById('statsTitle').innerText = `🏆 Classement de ${monthNames[currentMonth]}`;
        connectToMonth(currentMonth);
    });

    function checkUserSession() {
        const savedUser = localStorage.getItem('jeudiCuistot_user');
        if (savedUser && participants.includes(savedUser)) {
            currentUser = savedUser;
            document.getElementById('welcomeScreen').style.display = 'none';
            updateSidebarUserInfo();
            generatePlanningCards();
        } else {
            document.getElementById('welcomeScreen').style.display = 'flex';
        }
    }

    function updateSidebarUserInfo() {
        const emoji = customEmojisMapping[currentUser] || "🦊";
        document.getElementById('sidebarUserName').innerText = currentUser;
        document.getElementById('sidebarUserEmoji').innerText = emoji;
        document.getElementById('mobileUserName').innerText = currentUser;
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        const selected = document.getElementById('existingProfileSelect').value;
        if(selected) {
            currentUser = selected;
            localStorage.setItem('jeudiCuistot_user', currentUser);
            document.getElementById('welcomeScreen').style.display = 'none';
            updateSidebarUserInfo();
            generatePlanningCards();
        }
    });

    document.getElementById('createProfileBtn').addEventListener('click', () => {
        const inputName = document.getElementById('newProfileName').value.trim();
        if (inputName === "") return alert("Prénom invalide.");
        if (participants.some(p => p.toLowerCase() === inputName.toLowerCase())) return alert("Prénom déjà pris.");

        participants.push(inputName);
        customEmojisMapping[inputName] = selectedEmoji;

        // Sauvegarde globale de l'équipe
        setDoc(doc(db, "planning", "global_team"), { names: participants, customEmojisMapping: customEmojisMapping }, { merge: true }).then(() => {
            currentUser = inputName;
            localStorage.setItem('jeudiCuistot_user', currentUser);
            document.getElementById('newProfileName').value = "";
            document.getElementById('welcomeScreen').style.display = 'none';
            updateSidebarUserInfo();
            generatePlanningCards();
        });
    });

    window.triggerLogout = function() {
        if(confirm("Voulez-vous changer de profil ou vous déconnecter ?")) {
            localStorage.removeItem('jeudiCuistot_user');
            currentUser = "";
            fillExistingProfilesDropdown();
            document.getElementById('welcomeScreen').style.display = 'flex';
        }
    }
    document.getElementById('logoutBtn').addEventListener('click', triggerLogout);

    function fillExistingProfilesDropdown() {
        const select = document.getElementById('existingProfileSelect');
        select.innerHTML = "";
        participants.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.innerText = `${customEmojisMapping[p] || "🦊"} ${p}`;
            select.appendChild(opt);
        });
        document.getElementById('teamCount').innerText = participants.length;
    }

    // ÉCOUTEUR GLOBAL 1 : Équipe unique
    onSnapshot(doc(db, "planning", "global_team"), (teamSnap) => {
        if (teamSnap.exists()) {
            const teamData = teamSnap.data();
            participants = teamData.names || [...defaultParticipants];
            customEmojisMapping = teamData.customEmojisMapping || {};
        } else {
            // Création initiale si le document n'existe pas encore
            participants = [...defaultParticipants];
            customEmojisMapping = {};
            setDoc(doc(db, "planning", "global_team"), { names: participants, customEmojisMapping: {} });
        }
        fillExistingProfilesDropdown();
        checkUserSession();
        initInputs();
        if(currentUser) {
            generatePlanningCards();
            if (document.getElementById('page-stats').classList.contains('active')) generateStats();
        }
    });

    // ÉCOUTEUR GLOBAL 2 : Changements de mois pour le planning
    function connectToMonth(monthId) {
        if (unsubscribeMonth) unsubscribeMonth();
        unsubscribeMonth = onSnapshot(doc(db, "planning", `mois_${monthId}`), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                thursdaysData = data.thursdaysData || [];
                overrides = data.overrides || {};
            } else {
                thursdaysData = []; overrides = {};
                setDoc(doc(db, "planning", `mois_${monthId}`), { thursdaysData: [], overrides: {} });
            }
            if(currentUser) {
                generatePlanningCards();
                if (document.getElementById('page-stats').classList.contains('active')) generateStats();
            }
        });
    }

    function initInputs() {
        const container = document.getElementById('inputsContainer');
        container.innerHTML = '';
        participants.forEach((name, index) => {
            const currentEmoji = customEmojisMapping[name] || "🦊";
            const div = document.createElement('div');
            div.className = 'input-group';
            let emojiOptionsHTML = availableEmojis.map(emo => `<option value="${emo}" ${emo === currentEmoji ? 'selected' : ''}>${emo}</option>`).join('');
            
            div.innerHTML = `
                <select class="edit-emoji-select" data-index="${index}" id="emoji-select-${index}">${emojiOptionsHTML}</select>
                <input type="text" value="${name}" data-index="${index}" id="input-chef-${index}">
            `;
            container.appendChild(div);
            
            document.getElementById(`emoji-select-${index}`).addEventListener('change', (e) => {
                customEmojisMapping[participants[e.target.dataset.index]] = e.target.value;
                if(currentUser === participants[e.target.dataset.index]) updateSidebarUserInfo();
                setDoc(doc(db, "planning", "global_team"), { customEmojisMapping: customEmojisMapping }, { merge: true });
            });

            document.getElementById(`input-chef-${index}`).addEventListener('blur', (e) => {
                const idx = e.target.dataset.index; const oldName = participants[idx]; const newName = e.target.value.trim();
                if(oldName === newName || !newName) return;
                if(participants.some((p, pIdx) => p.toLowerCase() === newName.toLowerCase() && pIdx != idx)) { e.target.value = oldName; return alert("Nom existant."); }

                participants[idx] = newName;
                if(customEmojisMapping[oldName]) { customEmojisMapping[newName] = customEmojisMapping[oldName]; delete customEmojisMapping[oldName]; }
                if(currentUser === oldName) { currentUser = newName; localStorage.setItem('jeudiCuistot_user', currentUser); updateSidebarUserInfo(); }

                setDoc(doc(db, "planning", "global_team"), { names: participants, customEmojisMapping: customEmojisMapping }, { merge: true });
            });
        });
    }

    window.updateRoleManually = function(globalIndex, roleType, selectedValue) {
        if (!overrides[globalIndex]) overrides[globalIndex] = { ...getRolesForGlobalIndex(globalIndex) };
        overrides[globalIndex][roleType] = selectedValue;
        setDoc(doc(db, "planning", `mois_${currentMonth}`), { overrides: overrides }, { merge: true });
    }

    window.rateWeekCloud = function(weekIndex, type, starRating) {
        if(!currentUser) return;
        if(!thursdaysData[weekIndex]) thursdaysData[weekIndex] = { ratings: {}, ratingsDessert: {}, presence: [] };
        const fieldName = type === 'plat' ? 'ratings' : 'ratingsDessert';
        if(!thursdaysData[weekIndex][fieldName]) thursdaysData[weekIndex][fieldName] = {};
        
        thursdaysData[weekIndex][fieldName][currentUser] = starRating;
        setDoc(doc(db, "planning", `mois_${currentMonth}`), { thursdaysData: thursdaysData }, { merge: true });
    }

    window.togglePresence = function(weekIndex) {
        if(!currentUser) return;
        if(!thursdaysData[weekIndex]) thursdaysData[weekIndex] = { ratings: {}, ratingsDessert: {}, presence: [] };
        if(!thursdaysData[weekIndex].presence) thursdaysData[weekIndex].presence = [];
        const presenceList = thursdaysData[weekIndex].presence;
        const pIdx = presenceList.indexOf(currentUser);
        if (pIdx > -1) presenceList.splice(pIdx, 1); else presenceList.push(currentUser);
        setDoc(doc(db, "planning", `mois_${currentMonth}`), { thursdaysData: thursdaysData }, { merge: true });
    }

    function buildOptionsHTML(selectedName) {
        return participants.map(p => `<option value="${p}" ${p === selectedName ? 'selected' : ''}>${customEmojisMapping[p] || "🦊"} ${p}</option>`).join('');
    }

    function generatePlanningCards() {
        const cardsContainer = document.getElementById('cardsContainer');
        cardsContainer.innerHTML = '';
        if(!currentUser) return;

        const parts = currentMonth.split('-');
        const thursdaysDates = getThursdaysInMonthWithGlobalIndex(parseInt(parts[0]), parseInt(parts[1]) - 1);

        thursdaysDates.forEach((jeudiInfo, i) => {
            const card = document.createElement('div');
            card.className = `semaine-card sem-${i + 1}`;
            const roles = getRolesForGlobalIndex(jeudiInfo.globalIndex);

            if(!thursdaysData[i]) thursdaysData[i] = { ratings: {}, ratingsDessert: {}, presence: [] };
            const platRatings = thursdaysData[i].ratings || {};
            const dessertRatings = thursdaysData[i].ratingsDessert || {};
            
            const vPlat = Object.keys(platRatings); const vDessert = Object.keys(dessertRatings);
            let avgPlatText = "Plat: —"; if(vPlat.length > 0) avgPlatText = `🍲 ${(vPlat.reduce((s,v)=>s+platRatings[v],0)/vPlat.length).toFixed(1)} (${vPlat.length}v)`;
            let avgDessertText = "Dessert: —"; if(vDessert.length > 0) avgDessertText = `🍰 ${(vDessert.reduce((s,v)=>s+dessertRatings[v],0)/vDessert.length).toFixed(1)} (${vDessert.length}v)`;

            let starsPlatHTML = '', starsDessertHTML = '';
            for(let s = 1; s <= 5; s++) {
                starsPlatHTML += `<span class="star ${s <= (platRatings[currentUser]||0) ? 'active' : ''}" onclick="rateWeekCloud(${i}, 'plat', ${s})">★</span>`;
                starsDessertHTML += `<span class="star ${s <= (dessertRatings[currentUser]||0) ? 'active' : ''}" onclick="rateWeekCloud(${i}, 'dessert', ${s})">★</span>`;
            }

            const currentPresence = thursdaysData[i].presence || [];
            const isPresent = currentPresence.includes(currentUser);

            card.innerHTML = `
                <div class="card-header">
                    <span style="font-weight:800;">${jeudiInfo.dateText}</span>
                    <div class="avg-rating"><div>${avgPlatText}</div><div>${avgDessertText}</div></div>
                </div>
                <div class="role-box"><span class="role-label">🍲 Plat Principal</span><select class="role-select-custom" onchange="updateRoleManually(${jeudiInfo.globalIndex}, 'plat', this.value)">${buildOptionsHTML(roles.plat)}</select></div>
                <div class="role-box"><span class="role-label">🍰 Dessert</span><select class="role-select-custom" onchange="updateRoleManually(${jeudiInfo.globalIndex}, 'dessert', this.value)">${buildOptionsHTML(roles.dessert)}</select></div>
                <div class="role-box"><span class="role-label">🔄 Remplaçant</span><select class="role-select-custom" onchange="updateRoleManually(${jeudiInfo.globalIndex}, 'remp', this.value)">${buildOptionsHTML(roles.remp)}</select></div>
                <div class="presence-zone">
                    <div class="presence-header"><span>🙋‍♂️ Présents (${currentPresence.length})</span><button class="presence-btn ${isPresent ? 'active' : ''}" onclick="togglePresence(${i})">${isPresent ? '✅ Présent' : '❌ Absent'}</button></div>
                    <div class="presence-list">${currentPresence.map(p => `${customEmojisMapping[p]||"🦊"} ${p}`).join(', ') || "Personne"}</div>
                </div>
                <div class="rating-box">
                    <div class="rating-row"><span class="role-label">Note Plat :</span><div class="stars">${starsPlatHTML}</div></div>
                    <div class="rating-row"><span class="role-label">Note Dessert :</span><div class="stars">${starsDessertHTML}</div></div>
                </div>
            `;
            cardsContainer.appendChild(card);
        });
    }

    function generateStats() {
        const tbody = document.getElementById('statsTableBody'); tbody.innerHTML = '';
        let playerStats = participants.map(name => ({ name, totalMoyennes: 0, repasComptes: 0 }));
        const parts = currentMonth.split('-');
        const thursdaysDates = getThursdaysInMonthWithGlobalIndex(parseInt(parts[0]), parseInt(parts[1]) - 1);

        thursdaysDates.forEach((jeudiInfo, i) => {
            if(!thursdaysData[i]) return;
            const platRatings = thursdaysData[i].ratings || {}; const dessertRatings = thursdaysData[i].ratingsDessert || {};
            const vPlat = Object.keys(platRatings); const vDessert = Object.keys(dessertRatings);
            const roles = getRolesForGlobalIndex(jeudiInfo.globalIndex);

            if (vPlat.length > 0) {
                let cp = participants.indexOf(roles.plat);
                if(cp > -1) { playerStats[cp].totalMoyennes += (vPlat.reduce((s,v)=>s+platRatings[v],0)/vPlat.length); playerStats[cp].repasComptes++; }
            }
            if (vDessert.length > 0) {
                let cd = participants.indexOf(roles.dessert);
                if(cd > -1) { playerStats[cd].totalMoyennes += (vDessert.reduce((s,v)=>s+dessertRatings[v],0)/vDessert.length); playerStats[cd].repasComptes++; }
            }
        });

        playerStats.forEach(p => { p.moyenne = p.repasComptes > 0 ? (p.totalMoyennes / p.repasComptes).toFixed(1) : "N/A"; });
        playerStats.sort((a, b) => a.moyenne === "N/A" ? 1 : b.moyenne === "N/A" ? -1 : parseFloat(b.moyenne) - parseFloat(a.moyenne));

        playerStats.forEach((p, index) => {
            let rc = p.moyenne !== "N/A" ? (index===0?"rank-1":index===1?"rank-2":index===2?"rank-3":"") : "";
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge-rank ${rc}">${index + 1}</span></td>
                <td style="font-weight:700;">${customEmojisMapping[p.name]||"🦊"} ${p.name}</td>
                <td style="color:${p.moyenne!=='N/A'?'#eab308':'#94a3b8'}; font-weight:800;">${p.moyenne!=='N/A'?p.moyenne+' ★':'—'}</td>
                <td>${p.repasComptes}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    connectToMonth(currentMonth);
</script>
</body>
</html>
